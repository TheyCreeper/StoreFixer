name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore StoreFixer.slnx

    - name: Build Solution
      run: dotnet build StoreFixer.slnx --configuration Release --no-restore

    - name: Publish Application
      run: dotnet publish StoreFixer/StoreFixer.csproj --configuration Release --output publish --no-restore

    - name: Create ZIP of Artifacts
      run: powershell Compress-Archive -Path "publish\*" -DestinationPath "StoreFixer.zip"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: StoreFixer
        path: StoreFixer.zip
